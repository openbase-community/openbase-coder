  ]},
  { "Getting Started" = "getting-started.md" },
  { "Downloads" = "downloads.md" },
  { "Manual Setup" = "manual-installation.md" },
  { "Cloud DevSpace" = "cloud-devspace.md" },
  { "Local-Only Mode" = "local-only.md" },
  { "Troubleshooting" = "troubleshooting.md" },
  { "Uninstall" = "uninstall.md" },
  { "Commands" = [
    "commands/index.md",
    { "backend" = "commands/backend.md" },
    { "bootstrap" = "commands/bootstrap.md" },
    { "claude" = "commands/claude.md" },
    { "claude-sync" = "commands/claude-sync.md" },
    { "defaults" = "commands/defaults.md" },
    { "doctor" = "commands/doctor.md" },
    { "login" = "commands/login.md" },
    { "logout" = "commands/logout.md" },
    { "onboarding" = "commands/onboarding.md" },
    { "plugins" = "commands/plugins.md" },
    { "restart" = "commands/restart.md" },
    { "self-update" = "commands/self-update.md" },
    { "server" = "commands/server.md" },
    { "services" = "commands/services.md" },
    { "services install" = "commands/services-install.md" },
    { "services start" = "commands/services-start.md" },
    { "services stop" = "commands/services-stop.md" },
    { "services status" = "commands/services-status.md" },
    { "services logs" = "commands/services-logs.md" },
    { "services regenerate" = "commands/services-regenerate.md" },
    { "setup" = "commands/setup.md" },
    { "sync" = "commands/sync.md" }
  ]},
  { "Plugins" = [
    "plugins/index.md",
    { "Brain Score Concurrency" = "plugins/brain-score-concurrency.md" }
  ]},
  { "Configuration" = "configuration.md" },
  { "Files and Paths" = "files-and-paths.md" },
