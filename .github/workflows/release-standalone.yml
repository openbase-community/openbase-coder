name: Release Standalone CLI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, with or without a v prefix"
        required: true
      draft:
        description: "Create the GitHub release as a draft"
        required: true
        default: true
        type: boolean
  # Called by auto-release.yml; tags pushed with GITHUB_TOKEN cannot trigger
  # workflows, so the release runs in the same workflow run instead.
  workflow_call:
    inputs:
      version:
        description: "Release version, with or without a v prefix"
        required: true
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-standalone-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    if: github.ref == 'refs/heads/main'
    runs-on: macos-14
    env:
      APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
      APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_CODESIGN_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CODESIGN_KEYCHAIN_PASSWORD }}
      APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
    steps:
      - name: Checkout CLI
        uses: actions/checkout@v4
        with:
          path: cli

      - name: Checkout console
        uses: actions/checkout@v4
        with:
          repository: openbase-community/openbase-coder-console
          path: console

      - name: Checkout coder-react
        uses: actions/checkout@v4
        with:
          repository: openbase-community/openbase-coder-react
          path: coder-react

      - name: Checkout multi-react
        uses: actions/checkout@v4
        with:
          repository: montaguegabe/multi-react
          path: multi-react

      - name: Checkout boilersync-react
        uses: actions/checkout@v4
        with:
          repository: montaguegabe/boilersync-react
          path: boilersync-react

      - name: Checkout skills
        uses: actions/checkout@v4
        with:
          repository: openbase-community/openbase-coder-skills
          path: skills

      - name: Checkout workspace instructions
        uses: actions/checkout@v4
        with:
          repository: openbase-community/openbase-coder-workspace
          path: workspace-seed

      - name: Capture repo SHAs
        id: shas
        run: |
          repo_shas="$(jq -cn \
            --arg cli "$(git -C cli rev-parse HEAD)" \
            --arg console "$(git -C console rev-parse HEAD)" \
            --arg coder_react "$(git -C coder-react rev-parse HEAD)" \
            --arg multi_react "$(git -C multi-react rev-parse HEAD)" \
            --arg boilersync_react "$(git -C boilersync-react rev-parse HEAD)" \
            --arg skills "$(git -C skills rev-parse HEAD)" \
            --arg workspace "$(git -C workspace-seed rev-parse HEAD)" \
            '{
              "cli": $cli,
              "console": $console,
              "coder-react": $coder_react,
              "multi-react": $multi_react,
              "boilersync-react": $boilersync_react,
              "skills": $skills,
              "workspace": $workspace
            }')"
          echo "repo_shas=${repo_shas}" >> "$GITHUB_OUTPUT"

      - name: Prepare public build workspace
        run: |
          cp -R workspace-seed/instructions instructions
          cat > package.json <<'JSON'
          {"name":"openbase-coder-release-workspace","private":true,"packageManager":"pnpm@10.18.0"}
          JSON
          cat > pnpm-workspace.yaml <<'YAML'
          packages:
            - "console"
            - "coder-react"
            - "multi-react"
            - "boilersync-react"
          YAML

      - name: Resolve version and target
        id: release
        run: |
          version="${{ inputs.version }}"
          version="${version#v}"
          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "Unsupported macOS architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          # Prerelease versions (PEP 440 a/b/rc/.dev suffixes) publish as
          # GitHub prereleases and serve the beta update channel.
          prerelease_pattern='([0-9](a|b|rc)[0-9])|\.dev|-'
          if [[ "$version" =~ $prerelease_pattern ]]; then
            channel="beta"
            prerelease="true"
          else
            channel="stable"
            prerelease="false"
          fi
          {
            echo "version=${version}"
            echo "tag=v${version}"
            echo "target=${target}"
            echo "channel=${channel}"
            echo "prerelease=${prerelease}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install standalone Python
        run: |
          uv python install --managed-python 3.12
          uv python find --managed-python 3.12

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.18.0 --activate

      - name: Install LiveKit server
        run: |
          brew update
          brew install livekit
          livekit_server="$(command -v livekit-server)"
          "$livekit_server" --version
          echo "LIVEKIT_SERVER_BIN=${livekit_server}" >> "$GITHUB_ENV"

      - name: Build package directory
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_OPENBASE_CODER: ${{ steps.release.outputs.version }}
        run: |
          package_dir="$RUNNER_TEMP/openbase-coder-package-${{ steps.release.outputs.target }}"
          python_bin="$(uv python find --managed-python 3.12)"
          "$python_bin" cli/scripts/build_standalone_package.py \
            --version "${{ steps.release.outputs.version }}" \
            --target "${{ steps.release.outputs.target }}" \
            --channel "${{ steps.release.outputs.channel }}" \
            --repo-shas '${{ steps.shas.outputs.repo_shas }}' \
            --python "$python_bin" \
            --livekit-server-bin "$LIVEKIT_SERVER_BIN" \
            --package-dir "$package_dir" \
            --force
          echo "PACKAGE_DIR=${package_dir}" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        if: ${{ env.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 != '' }}
        run: |
          keychain_password="${APPLE_CODESIGN_KEYCHAIN_PASSWORD:-$(uuidgen)}"
          keychain="$RUNNER_TEMP/openbase-codesign.keychain-db"
          cert_path="$RUNNER_TEMP/developer-id-application.p12"
          echo "$APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$cert_path" -k "$keychain" -P "$APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"

      - name: Code sign package
        if: ${{ env.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 != '' }}
        run: |
          identity="${APPLE_CODESIGN_IDENTITY:-Developer ID Application}"
          python_bin="$(uv python find --managed-python 3.12)"
          "$python_bin" cli/scripts/sign_standalone_package.py \
            --package-dir "$PACKAGE_DIR" \
            --identity "$identity"
          codesign --verify --deep --strict "$PACKAGE_DIR/bin/livekit-server"
          codesign --verify --deep --strict "$PACKAGE_DIR/python/bin/python3.12"

      - name: Archive release assets
        run: |
          mkdir -p dist
          asset="openbase-coder-package-${{ steps.release.outputs.target }}.tar.gz"
          tar -czf "dist/${asset}" -C "$PACKAGE_DIR" .
          cp cli/scripts/install.sh dist/install.sh
          (cd dist && shasum -a 256 "$asset" install.sh > openbase-coder-package_SHA256SUMS)
          echo "ARCHIVE_PATH=dist/${asset}" >> "$GITHUB_ENV"

      - name: Build update manifest
        env:
          OPENBASE_UPDATE_SIGNING_KEY: ${{ secrets.OPENBASE_UPDATE_SIGNING_KEY }}
        run: |
          # Run with the packaged runtime Python so the cryptography package
          # is available when OPENBASE_UPDATE_SIGNING_KEY is set (signing is
          # skipped silently when the secret is unset).
          "$PACKAGE_DIR/python/bin/python" cli/scripts/build_update_manifest.py \
            --version "${{ steps.release.outputs.version }}" \
            --channel "${{ steps.release.outputs.channel }}" \
            --target "${{ steps.release.outputs.target }}" \
            --tarball "$ARCHIVE_PATH" \
            --url-base "https://github.com/openbase-community/openbase-coder/releases/download/${{ steps.release.outputs.tag }}/" \
            --repo-shas '${{ steps.shas.outputs.repo_shas }}' \
            --package-metadata "$PACKAGE_DIR/openbase-coder-package.json" \
            --output dist/update-manifest.json

      - name: Notarize package
        if: ${{ env.APPLE_NOTARY_KEY_ID != '' && env.APPLE_NOTARY_ISSUER_ID != '' && env.APPLE_NOTARY_KEY != '' }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          printf '%s' "$APPLE_NOTARY_KEY" > "$key_path"
          notarization_zip="$RUNNER_TEMP/openbase-coder-notarization.zip"
          ditto -c -k --keepParent "$PACKAGE_DIR" "$notarization_zip"
          xcrun notarytool submit "$notarization_zip" \
            --key "$key_path" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait

      # Guard against sibling repos being pushed while this release built
      # (multi workspaces push all subrepos together); a moved HEAD means the
      # release snapshot may be incoherent — fail rather than ship it.
      - name: Verify sibling repos did not move during the build
        run: |
          set -euo pipefail
          # cli itself is pinned by the tag; only floating sibling checkouts race.
          echo '${{ steps.shas.outputs.repo_shas }}' | jq -r 'to_entries[] | "\(.key) \(.value)"' |
          while read -r name sha; do
            [ "$name" = "cli" ] && continue
            dir="$name"
            [ "$name" = "workspace" ] && dir="workspace-seed"
            [ -d "$dir/.git" ] || continue
            git -C "$dir" fetch origin --quiet
            now="$(git -C "$dir" rev-parse "origin/HEAD" 2>/dev/null || git -C "$dir" rev-parse origin/main)"
            if [ "$now" != "$sha" ]; then
              echo "::error::$name moved from $sha to $now during the release build; re-tag to release a coherent snapshot."
              exit 1
            fi
          done

      # Draft-first so releases/latest and the update manifest never point at
      # a release whose assets are still uploading; publishing is atomic.
      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Openbase Coder ${{ steps.release.outputs.tag }}
          draft: true
          prerelease: ${{ steps.release.outputs.prerelease }}
          files: |
            dist/*.tar.gz
            dist/install.sh
            dist/openbase-coder-package_SHA256SUMS
            dist/update-manifest.json*

      - name: Publish release
        if: ${{ inputs.draft != true }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ steps.release.outputs.tag }}" --draft=false \
            --repo "${{ github.repository }}"
