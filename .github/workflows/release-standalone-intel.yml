# Intel (x86_64) standalone CLI package build. Deliberately manual-only and
# additive: it never creates releases or tags, and it never touches the
# arm64 pathway's assets — update-manifest.json, install.sh, and
# openbase-coder-package_SHA256SUMS are left exactly as the regular release
# published them. It only attaches openbase-coder-package-x86_64-apple-darwin
# assets to an EXISTING release, primarily so the desktop repo's
# electron-intel-installer workflow has an Intel CLI seed to bundle.
#
# The Intel package is NOT served by self-update: the update manifest gains
# no x86_64 target entry. If Intel ever becomes a supported platform, extend
# build_update_manifest.py's --merge-existing flow deliberately.
#
# Sibling repos are checked out at the exact SHAs recorded in the release's
# update-manifest.json, so the Intel package is byte-coherent with the
# released aarch64 package rather than a fresher snapshot of main.
#
# GitHub's last hosted Intel image is macos-15-intel, supported through
# August 2027.
name: Release Standalone CLI (Intel)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the x86_64-apple-darwin package to, e.g. v0.2.0"
        required: true

permissions:
  contents: write

concurrency:
  group: release-standalone-intel
  cancel-in-progress: false

jobs:
  build-intel-package:
    runs-on: macos-15-intel
    timeout-minutes: 120
    env:
      APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
      APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_CODESIGN_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CODESIGN_KEYCHAIN_PASSWORD }}
      APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
    steps:
      - name: Resolve release snapshot
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(uname -m)" != "x86_64" ]; then
            echo "Expected an x86_64 runner, got $(uname -m)" >&2
            exit 1
          fi

          tag="${{ inputs.tag }}"
          tag="v${tag#v}"
          gh release download "$tag" --repo openbase-community/openbase-coder \
            --pattern "update-manifest.json" \
            --dir "$RUNNER_TEMP"
          manifest="$RUNNER_TEMP/update-manifest.json"

          version="$(jq -r '.version' "$manifest")"
          channel="$(jq -r '.channel' "$manifest")"
          if [ "v${version}" != "$tag" ]; then
            echo "Release $tag has update-manifest version ${version}; refusing an incoherent build." >&2
            exit 1
          fi

          repo_shas="$(jq -c '.repo_shas' "$manifest")"
          if [ "$(jq -r 'length' <<< "$repo_shas")" -eq 0 ]; then
            echo "Release $tag has no repo_shas in its update manifest; cannot pin the snapshot." >&2
            exit 1
          fi
          for repo in cli console coder-react multi-react boilersync-react open-approvals-react skills workspace; do
            sha="$(jq -r --arg repo "$repo" '.[$repo] // empty' <<< "$repo_shas")"
            if [ -z "$sha" ]; then
              echo "Release $tag's repo_shas is missing ${repo}; cannot pin the snapshot." >&2
              exit 1
            fi
            echo "${repo}=${sha}" >> "$GITHUB_OUTPUT"
          done

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "channel=${channel}"
            echo "target=x86_64-apple-darwin"
            echo "repo_shas=${repo_shas}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout CLI
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.cli }}
          path: cli

      - name: Checkout console
        uses: actions/checkout@v4
        with:
          repository: openbase-community/openbase-coder-console
          ref: ${{ steps.release.outputs.console }}
          path: console

      - name: Checkout coder-react
        uses: actions/checkout@v4
        with:
          repository: openbase-community/openbase-coder-react
          ref: ${{ steps.release.outputs['coder-react'] }}
          path: coder-react

      - name: Checkout multi-react
        uses: actions/checkout@v4
        with:
          repository: montaguegabe/multi-react
          ref: ${{ steps.release.outputs['multi-react'] }}
          path: multi-react

      - name: Checkout boilersync-react
        uses: actions/checkout@v4
        with:
          repository: montaguegabe/boilersync-react
          ref: ${{ steps.release.outputs['boilersync-react'] }}
          path: boilersync-react

      - name: Checkout open-approvals-react
        uses: actions/checkout@v4
        with:
          repository: openbase-community/open-approvals-react
          ref: ${{ steps.release.outputs['open-approvals-react'] }}
          path: open-approvals-react

      - name: Checkout skills
        uses: actions/checkout@v4
        with:
          repository: openbase-community/openbase-coder-skills
          ref: ${{ steps.release.outputs.skills }}
          path: skills

      - name: Checkout workspace instructions
        uses: actions/checkout@v4
        with:
          repository: openbase-community/openbase-coder-workspace
          ref: ${{ steps.release.outputs.workspace }}
          path: workspace-seed

      - name: Prepare public build workspace
        run: |
          cp -R workspace-seed/instructions instructions
          # Single source of truth for the build workspace, including a pinned
          # lockfile so third-party npm deps don't float between releases.
          # Regenerate with cli/scripts/update-release-lockfile.sh.
          cp cli/scripts/release-workspace/package.json .
          cp cli/scripts/release-workspace/pnpm-workspace.yaml .
          cp cli/scripts/release-workspace/pnpm-lock.yaml .

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install standalone Python
        run: |
          uv python install --managed-python 3.12
          uv python find --managed-python 3.12

      # corepack must run before setup-node: setup-node v5 auto-detects the
      # packageManager field and probes pnpm for cache setup.
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.18.0 --activate

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          # No lockfile at the synthesized build-workspace root; disable
          # setup-node's automatic packageManager cache probing.
          package-manager-cache: false

      - name: Install LiveKit server
        run: |
          brew update
          brew install livekit
          livekit_server="$(command -v livekit-server)"
          "$livekit_server" --version
          echo "LIVEKIT_SERVER_BIN=${livekit_server}" >> "$GITHUB_ENV"

      - name: Build package directory
        env:
          # hatch-vcs only honors the unsuffixed form; the _FOR_<dist> variant
          # is silently ignored and the build falls back to a dev version.
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.release.outputs.version }}
        run: |
          package_dir="$RUNNER_TEMP/openbase-coder-package-${{ steps.release.outputs.target }}"
          python_bin="$(uv python find --managed-python 3.12)"
          "$python_bin" cli/scripts/build_standalone_package.py \
            --version "${{ steps.release.outputs.version }}" \
            --target "${{ steps.release.outputs.target }}" \
            --channel "${{ steps.release.outputs.channel }}" \
            --repo-shas '${{ steps.release.outputs.repo_shas }}' \
            --python "$python_bin" \
            --livekit-server-bin "$LIVEKIT_SERVER_BIN" \
            --package-dir "$package_dir" \
            --force
          echo "PACKAGE_DIR=${package_dir}" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        if: ${{ env.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 != '' }}
        run: |
          keychain_password="${APPLE_CODESIGN_KEYCHAIN_PASSWORD:-$(uuidgen)}"
          keychain="$RUNNER_TEMP/openbase-codesign.keychain-db"
          cert_path="$RUNNER_TEMP/developer-id-application.p12"
          echo "$APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$cert_path" -k "$keychain" -P "$APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"

      - name: Code sign package
        if: ${{ env.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 != '' }}
        run: |
          identity="${APPLE_CODESIGN_IDENTITY:-Developer ID Application}"
          python_bin="$(uv python find --managed-python 3.12)"
          "$python_bin" cli/scripts/sign_standalone_package.py \
            --package-dir "$PACKAGE_DIR" \
            --identity "$identity"
          codesign --verify --deep --strict "$PACKAGE_DIR/bin/livekit-server"
          codesign --verify --deep --strict "$PACKAGE_DIR/python/bin/python3.12"

      - name: Notarize package
        if: ${{ env.APPLE_NOTARY_KEY_ID != '' && env.APPLE_NOTARY_ISSUER_ID != '' && env.APPLE_NOTARY_KEY != '' }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          printf '%s' "$APPLE_NOTARY_KEY" > "$key_path"
          notarization_zip="$RUNNER_TEMP/openbase-coder-notarization.zip"
          ditto -c -k --keepParent "$PACKAGE_DIR" "$notarization_zip"
          xcrun notarytool submit "$notarization_zip" \
            --key "$key_path" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait

      - name: Archive Intel package
        run: |
          mkdir -p dist
          asset="openbase-coder-package-${{ steps.release.outputs.target }}.tar.gz"
          tar -czf "dist/${asset}" -C "$PACKAGE_DIR" .
          # Distinct sums file: never overwrite the arm64 pathway's
          # openbase-coder-package_SHA256SUMS.
          (cd dist && shasum -a 256 "$asset" > "openbase-coder-package-${{ steps.release.outputs.target }}_SHA256SUMS")

      - name: Attach Intel assets to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # --clobber only replaces the Intel-named assets on reruns; the
          # release's existing arm64 assets are untouched.
          gh release upload "${{ steps.release.outputs.tag }}" \
            --repo openbase-community/openbase-coder \
            --clobber \
            dist/openbase-coder-package-${{ steps.release.outputs.target }}.tar.gz \
            dist/openbase-coder-package-${{ steps.release.outputs.target }}_SHA256SUMS
